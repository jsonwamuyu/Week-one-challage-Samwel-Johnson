<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Time tracking dashboard</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="container cards">
      <!-- profile -->
      <div class="cards-profile">
        <div class="cards-profile__details">
          <img src="./images/image-jeremy.png"
            style="width:80px; height: 80px;border:2px solid white;border-radius: 50%;">
          <div class="cards-profile__details-name">
            <h5 style="opacity: 0.7;">Report for</h5>
            <h4>Jeremy Robson</h4>
          </div>
        </div>
        <div class="cards-profile__text">
          <a href="">Daily</a>
          <a class="active" href="">Weekly</a>
          <a href="">Monthly</a>
        </div>
      </div>
      <!-- Tracking time section -->
      <div class="cards-time">
        <div>
          <div
            style="background-color: var(--work-red); width:100%;height: 3rem;
             padding: 1rem 0;margin-bottom: -1rem; border-top-left-radius: 1rem;border-top-right-radius: 1rem;">
          </div>
          <div class="cards-time__card">
            <div class="ellipsis">
              <h5>Work</h5>
              <div>
                <a href="">
                  <img src="./images/icon-ellipsis.svg" alt="">
                </a>
              </div>
            </div>
            <h3>32hrs</h3>
            <p>Last week - 36hrs</p>
          </div>
        </div>

        <div>
          <div
            style="background-color: var(--play-blue); width:100%;height: 3rem;
             padding: 1rem 0;margin-bottom: -1rem; border-top-left-radius: 1rem;border-top-right-radius: 1rem;">
          </div>
          <div class="cards-time__card">
            <div class="ellipsis">
              <h5>Play</h5>
              <div>
                <a href="">
                  <img src="./images/icon-ellipsis.svg" alt="">
                </a>
              </div>
            </div>
            <h3>10hrs</h3>
            <p>Last week - 8hrs</p>
          </div>
        </div>

        <div>
          <div
            style="background-color: var(--study-red); width:100%;height: 3rem;
             padding: 1rem 0;margin-bottom: -1rem; border-top-left-radius: 1rem;border-top-right-radius: 1rem;">
          </div>
          <div class="cards-time__card">
            <div class="ellipsis">
              <h5>Study</h5>
              <div>
                <a href="">
                  <img src="./images/icon-ellipsis.svg" alt="">
                </a>
              </div>
            </div>
            <h3>4hrs</h3>
            <p>Last week - 7hrs</p>
          </div>
        </div>

        <div>
          <div
            style="background-color: var(--exercise-green); width:100%;height: 3rem;
             padding: 1rem 0;margin-bottom: -1rem; border-top-left-radius: 1rem;border-top-right-radius: 1rem;">
          </div>
          <div class="cards-time__card">
            <div class="ellipsis">
              <h5>Exercise</h5>
              <div>
                <a href="">
                  <img src="./images/icon-ellipsis.svg" alt="">
                </a>
              </div>
            </div>
            <h3>4hrs</h3>
            <p>Last week - 5hrs</p>
          </div>
        </div>

        <div>
          <div
            style="background-color: var(--social-violet); width:100%;height: 3rem;
             padding: 1rem 0;margin-bottom: -1rem; border-top-left-radius: 1rem;border-top-right-radius: 1rem;">
          </div>
          <div class="cards-time__card">
            <div class="ellipsis">
              <h5>Social</h5>
              <div>
                <a href="">
                  <img src="./images/icon-ellipsis.svg" alt="">
                </a>
              </div>
            </div>
            <h3>5hrs</h3>
            <p>Last week - 10hrs</p>
          </div>
        </div>

        <div>
          <div
            style="background-color: var(--work-red); width:100%;height: 3rem;
             padding: 1rem 0;margin-bottom: -1rem; border-top-left-radius: 1rem;border-top-right-radius: 1rem;">
          </div>
          <div class="cards-time__card">
            <div class="ellipsis">
              <h5>Self Care</h5>
              <div>
                <a href="">
                  <img src="./images/icon-ellipsis.svg" alt="">
                </a>
              </div>
            </div>
            <h3>2hrs</h3>
            <p>Last week - 2hrs</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Johnson Muchiri</a>.
  </div>
</body>

</html>
